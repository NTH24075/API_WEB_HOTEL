<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chi tiết khách sạn</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body
    data-page="hotel-detail"
    data-hotel-id="{{ hotel_id }}"
    data-check-in="{{ check_in }}"
    data-adults="{{ adults }}"
>
    <header class="topbar">
        <div class="container topbar-inner">
            <a class="brand" href="/">StayBook</a>
            <nav class="topnav">
                <a href="/">Khách sạn</a>
                <a href="#">Yêu thích</a>
                <a href="#">Booking test</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <section class="container">
            <div class="breadcrumb">
                <a href="/">Trang chủ</a>
                <span>/</span>
                <span>Chi tiết khách sạn</span>
            </div>

            <div id="detailLoading" class="loading-card">Đang tải chi tiết khách sạn...</div>

            <div id="hotelDetail" class="hotel-detail hidden">
                <section class="detail-header">
                    <div class="detail-main">
                        <div class="hotel-title-row">
                            <div>
                                <h1 id="hotelName"></h1>
                                <div class="hotel-meta-row">
                                    <span id="hotelStars" class="stars"></span>
                                    <span id="hotelAddress" class="hotel-address"></span>
                                </div>
                            </div>

                            <div id="ratingBox" class="rating-box"></div>
                        </div>

                        <div id="gallery" class="gallery-grid"></div>
                    </div>
                </section>

                <section class="detail-layout">
                    <div class="detail-left">
                        <div class="section-card">
                            <h2>Tổng quan</h2>
                            <p id="hotelDescription" class="muted-text"></p>
                        </div>

                        <div class="section-card">
                            <h2>Tiện nghi nổi bật</h2>
                            <div id="amenities" class="chips"></div>
                        </div>

                        <div class="section-card">
                            <h2>Đánh giá tổng hợp</h2>
                            <div id="sentiments" class="sentiment-list"></div>
                        </div>

                        <div class="section-card">
                            <div class="section-head">
                                <h2>Phòng và giá</h2>
                                <div class="muted-text">Dữ liệu live/test từ Amadeus</div>
                            </div>
                            <div id="offers" class="offers-list"></div>
                        </div>
                    </div>

                    <aside class="detail-right">
                        <div class="booking-card">
                            <div class="booking-card-top">
                                <div class="muted-label">Giá từ</div>
                                <div id="priceFrom" class="price-from"></div>
                                <div id="bookingSummary" class="muted-text"></div>
                            </div>

                            <button class="primary-btn block-btn">Đặt ngay (test)</button>
                            <button class="ghost-btn block-btn">Lưu yêu thích</button>

                            <div class="side-note">
                                Đây là trang detail demo cho đồ án. Booking và review có thể lưu test vào SQL nội bộ của bạn.
                            </div>
                        </div>
                    </aside>
                </section>
            </div>
        </section>
    </main>

    <script src="/static/js/hotel.js"></script>
</body>
</html>
